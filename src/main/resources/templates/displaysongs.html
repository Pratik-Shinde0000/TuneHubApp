<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<h2>List of Songs</h2>
	<table border="1">
		<tr>
			<th>name</th>
			<th>Artist</th>
			<th>Genre</th>
			<th>Link</th>
		</tr>
		<tr th:each="songs:${songs}">

			<td th:text="${songs.name}"></td>
			<td th:text="${songs.artist}"></td>
			<td th:text="${songs.genre}"></td>
			<td>
			<audio controls>
				<source th:src=${songs.link} type="audio/mpeg">
			</audio>
			</td>
		</tr>
	</table>
</body>
</html>
