<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style type="text/css">
body {
	font-family: Arial, sans-serif;
	/* Sets the font family for the entire document */
	margin: 0; /* Removes default margin */
	padding: 0; /* Removes default padding */
}

h1 {
	text-align: center; /* Centers the text horizontally */
	color: #333; /* Sets the text color */
	padding: 20px 0;
	/* Adds padding to the top and bottom of the heading */
}

a {
	display: block;
	/* Changes the display property to block, making the entire link clickable */
	text-decoration: none; /* Removes underline from links */
	color: #007bff; /* Sets the link color */
	padding: 10px 0; /* Adds padding to the top and bottom of the link */
	text-align: center; /* Centers the text horizontally */
	transition: color 0.3s ease;
	/* Adds smooth transition effect to link color */
}

a:hover {
	color: #0056b3; /* Changes link color on hover */
}

/* Adding hover effects for the links */
a:hover {
	background-color: #f0f0f0; /* Changes background color on hover */
	border-radius: 5px; /* Adds rounded corners to the link */
}

/* Styling for the container holding the links */
.container {
	max-width: 600px; /* Sets the maximum width of the container */
	margin: 0 auto; /* Centers the container horizontally */
	padding: 20px; /* Adds padding inside the container */
	background-color: #fff; /* Sets background color of the container */
	border-radius: 10px; /* Adds rounded corners to the container */
	box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
	/* Adds a shadow effect to the container */
}
</style>
</head>
<body>
	<h1>Welcome to Tune Hub Application</h1>
	<a href="/map-register">Click here for Register</a>
	<br>
	<br>
	<a href="/map-login">Click here for Login</a>
</body>
</html>
